name: Smart Files CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Validate Code (Syntax Check)
      run: |
        python -m compileall .

    - name: Test Core Modules
      run: |
        python -c "from services.main_agent import bot"
        python -c "from services.embedder import embed_file"
        python -c "from services.main_db import get_all_files_from_db"

    - name: Run Evaluation Pipeline
      run: |
        python evaluation/eval.py || echo "Evaluation skipped if dependencies missing"

    - name: Success Message
      run: echo "CI/CD pipeline executed successfully"